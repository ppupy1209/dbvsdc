spring:
  autoconfigure:
    exclude: []
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dbvsdc?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8}
    username: ${DB_USER:${DB_USERNAME:dbvsdc}}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  market-data-source: live
