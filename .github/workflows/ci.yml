name: CI

# 푸시·PR 마다: 백엔드 Gradle 빌드·테스트 + 프론트 Next.js 빌드
on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: 백엔드 빌드·테스트 (Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew build

  web:
    name: 프론트엔드 빌드 (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
