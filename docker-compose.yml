# dbvsdc 로컬 실행 환경 (전체 서비스 한번에)
#   docker compose up --build     # mysql + api + web 기동
#   open http://localhost:3000    # 프론트
#   curl http://localhost:8090/api/index-returns
#   docker compose down           # 정리 (-v 로 DB 볼륨까지 삭제)
#
# ※ 클라우드(운영) 배포는 이 파일이 아니라 각 서비스의 Dockerfile 이미지로:
#     web/Dockerfile, api/Dockerfile
# live 프로필: api.environment의 SPRING_PROFILES_ACTIVE를 live로 변경
# (단 LiveMarketDataSource 실연동 구현 후에만 의미 있음)

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: dbvsdc
      MYSQL_USER: dbvsdc
      MYSQL_PASSWORD: dbvsdc_pw
      MYSQL_ROOT_PASSWORD: root_pw
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pw"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./api
    environment:
      SPRING_PROFILES_ACTIVE: sample
      PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/dbvsdc
      DB_USER: dbvsdc
      DB_PASSWORD: dbvsdc_pw
    ports:
      - "8090:8080"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 는 빌드 시 번들에 박힘. 비워두면 Next 내장 /api 목 라우트 사용.
        NEXT_PUBLIC_API_BASE: ""
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mysql-data:
